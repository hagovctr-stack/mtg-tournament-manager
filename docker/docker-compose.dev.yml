services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg_secret
      POSTGRES_DB: mtg_tournament
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg -d mtg_tournament"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /app/backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mtg:mtg_secret@db:5432/mtg_tournament
      FRONTEND_URL: http://localhost:5173
      PORT: 3001
      NODE_ENV: development
    volumes:
      - ../backend:/app/backend
      - ../database:/app/database
      - backend_node_modules:/app/backend/node_modules
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "apk add --no-cache openssl &&
             npm install &&
             npm run db:generate &&
             npm run db:deploy &&
             npm run dev"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:3001
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
