version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg_secret
      POSTGRES_DB: mtg_tournament
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mtg -d mtg_tournament']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mtg:mtg_secret@db:5432/mtg_tournament
      FRONTEND_URL: http://localhost:8080
      PORT: 3001
      NODE_ENV: production
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "npm run db:deploy && node dist/server.js"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8080:80'

volumes:
  postgres_data:
